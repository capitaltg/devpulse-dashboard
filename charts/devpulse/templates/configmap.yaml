apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devpulse.configMapName" . }}
  labels:
    {{- include "devpulse.backend.selectorLabels" . | nindent 4 }}
data:
  AUTH_PROVIDER: {{ .Values.auth.provider | quote }}
  FRONTEND_BASE_URL: {{ include "devpulse.frontendBaseUrl" . | quote }}
  {{- if eq .Values.auth.provider "oidc" }}
  OIDC_ISSUER: {{ .Values.auth.oidc.issuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.auth.oidc.clientId | quote }}
  OIDC_SCOPE: {{ .Values.auth.oidc.scope | quote }}
  {{- end }}
  {{- if eq .Values.auth.provider "github" }}
  GITHUB_OAUTH_CLIENT_ID: {{ .Values.auth.github.clientId | quote }}
  {{- end }}
