{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devpulse.secretName" . }}
  labels:
    {{- include "devpulse.backend.selectorLabels" . | nindent 4 }}
type: Opaque
stringData:
  ENCRYPTION_KEY: {{ required "secret.values.encryptionKey is required (or provide secret.existingSecret). See values.yaml for generation command." .Values.secret.values.encryptionKey | quote }}
  AUTH_JWT_SECRET: {{ .Values.secret.values.authJwtSecret | quote }}
  DATABASE_URL: {{ required "database.url is required (or provide secret.existingSecret with a DATABASE_URL key)." .Values.database.url | quote }}
  {{- if eq .Values.auth.provider "github" }}
  GITHUB_OAUTH_CLIENT_SECRET: {{ .Values.secret.values.githubClientSecret | quote }}
  {{- end }}
{{- end }}
