apiVersion: v1
kind: Service
metadata:
  name: {{ include "devpulse.backend.fullname" . }}
  labels:
    {{- include "devpulse.backend.selectorLabels" . | nindent 4 }}
  {{- with .Values.backend.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "devpulse.backend.selectorLabels" . | nindent 4 }}
