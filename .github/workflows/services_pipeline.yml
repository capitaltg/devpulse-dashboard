name: Services Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
defaults:
  run:
    working-directory: services

env:
  IMAGE_NAME: ghcr.io/capitaltg/devpulse-dashboard-backend

jobs:
  services_ci_pipeline:
    name: Run tests and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run autoflake
        run: autoflake --check -r  --quiet app/

      - name: Run isort
        run: isort --profile black app/

      - name: Check code formatting
        run: black --check .

  build_and_publish:
    name: Build and publish docker image
    needs: services_ci_pipeline
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="-t ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          SCAN_TAG="sha-${{ github.sha }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="$TAGS -t ${{ env.IMAGE_NAME }}:latest"
            SCAN_TAG="latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS -t ${{ env.IMAGE_NAME }}:$VERSION"
            SCAN_TAG="$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "scan=$SCAN_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build . ${{ steps.tags.outputs.tags }}

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.scan }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      - name: Push images to GHCR
        run: docker push --all-tags ${{ env.IMAGE_NAME }}
