name: Frontend Image Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
defaults:
  run:
    working-directory: frontend

env:
  IMAGE_NAME: ghcr.io/capitaltg/devpulse-dashboard-frontend

jobs:
  frontend_ci_pipeline:
    name: Run tests and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      # - name: Check code formatting
      #   run: npm run check:prettier

      # - name: Run linter
      #   run: npm run lint

      - name: Run NPM package security audit scan
        run: npm audit --omit=dev

      - name: Build code
        run: npm run build --if-present

  build_and_publish:
    name: Build and publish docker image
    needs: frontend_ci_pipeline
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build code
        run: npm run build --if-present

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="-t ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          SCAN_TAG="sha-${{ github.sha }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="$TAGS -t ${{ env.IMAGE_NAME }}:latest"
            SCAN_TAG="latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS -t ${{ env.IMAGE_NAME }}:$VERSION"
            SCAN_TAG="$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "scan=$SCAN_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build . ${{ steps.tags.outputs.tags }}

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.scan }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      - name: Push images to GHCR
        run: docker push --all-tags ${{ env.IMAGE_NAME }}
